<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | Mihretab Nega</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090d12;
        color: #f7fbff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          linear-gradient(135deg, rgba(59, 183, 255, 0.12), transparent 48%),
          #090d12;
      }

      main {
        width: min(620px, 100%);
        border: 1px solid rgba(229, 236, 246, 0.14);
        border-radius: 8px;
        padding: clamp(1.5rem, 6vw, 3rem);
        background: rgba(20, 28, 38, 0.78);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1.05;
      }

      p {
        color: #9aa8ba;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 1rem;
        border-radius: 8px;
        padding: 0.8rem 1rem;
        background: linear-gradient(135deg, #3bb7ff, #34d399);
        color: #061017;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found.</h1>
      <p>The page may have moved, but the portfolio is still here.</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
